name: Deploy to Firebase Hosting
on:
  push:
    branches:
      - main

permissions:
  checks: write
  contents: read
  pull-requests: write

concurrency:
  group: firebase-hosting-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_test_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar lint
        run: npm run lint

      - name: Correr tests y verificar cobertura mínima (70%)
        run: npm run test:coverage

      - name: Compilar
        run: npm run build

      - name: Deploy a Firebase Hosting en production
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_FUNDACIONPADI_41CB2 }}
          channelId: live
          projectId: fundacionpadi-41cb2